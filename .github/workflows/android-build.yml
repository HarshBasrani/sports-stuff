name: Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Capacitor Sync & Repair
        run: |
          # Completely recreate the android project on CI to ensure environment integrity
          rm -rf android
          npx cap add android
          npx cap sync android
          ls -la android/

      - name: Build Android APK
        run: |
          cd android
          # Fix permissions for the wrapper
          chmod +x gradlew
          # Run build with low memory footprint for CI stability
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sports-stuff-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
